syntax = "proto3";

package daemon;

option go_package = "github.com/lemon4ksan/g-man-cli/proto/daemon";

service DaemonService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc StopDaemon(StopDaemonRequest) returns (StopDaemonResponse);
  rpc PlayGame(PlayGameRequest) returns (PlayGameResponse);
  rpc ExitGame(ExitGameRequest) returns (ExitGameResponse);
  rpc ExecAction(ExecActionRequest) returns (ExecActionResponse);
  rpc FreeMemory(FreeMemoryRequest) returns (FreeMemoryResponse);

  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);
  rpc UpdateManualPrices(UpdateManualPricesRequest) returns (UpdateManualPricesResponse);

  rpc GuardCode(GuardCodeRequest) returns (GuardCodeResponse);
  rpc GuardStatus(GuardStatusRequest) returns (GuardStatusResponse);
  rpc GuardList(GuardListRequest) returns (GuardListResponse);
  rpc GuardRespond(GuardRespondRequest) returns (GuardRespondResponse);
  rpc GuardImport(GuardImportRequest) returns (GuardImportResponse);
}

message FreeMemoryRequest {}

message FreeMemoryResponse {
  string message = 1;
  uint64 memory_bytes = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  bool connected = 1;
  string steam_id = 2;
  uint32 current_appid = 3;
  string uptime = 4;
  uint64 memory_bytes = 5;
  string current_app_name = 6;
  string persona_name = 7;
}

message StopDaemonRequest {}

message StopDaemonResponse {
  string message = 1;
}

message PlayGameRequest {
  uint32 appid = 1;
}

message PlayGameResponse {
  string message = 1;
}

message ExitGameRequest {}

message ExitGameResponse {
  string message = 1;
}

message Item {
  uint64 asset_id = 1;
  uint32 def_index = 2;
  uint32 quality = 3;
  uint32 quantity = 4;
  bool is_tradable = 5;
  bool is_craftable = 6;
  map<string, string> attributes = 7;
  uint64 original_id = 8;
}

message ExecActionRequest {
  uint32 appid = 1;
  string action = 2;
  map<string, string> params = 3;
}

message ExecActionResponse {
  string message = 1;
  repeated Item items = 2;
  string details = 3;
}

message StreamEventsRequest {}

message StreamEventsResponse {
  string event_id = 1;
  string event_type = 2;
  string payload_json = 3;
  int64 timestamp = 4;
}

message ManualPriceEntry {
  uint32 buy_keys = 1;
  double buy_metal = 2;
  uint32 sell_keys = 3;
  double sell_metal = 4;
}

message UpdateManualPricesRequest {
  map<string, ManualPriceEntry> prices = 1;
}

message UpdateManualPricesResponse {
  string message = 1;
  bool success = 2;
}

message GuardCodeRequest {}
message GuardCodeResponse {
  string code = 1;
}

message GuardConfirmation {
  uint64 id = 1;
  uint64 nonce = 2;
  string title = 3;
  string type_name = 4;
  string description = 5;
}

message GuardListRequest {}
message GuardListResponse {
  repeated GuardConfirmation confirmations = 1;
}

message GuardRespondRequest {
  uint64 confirmation_id = 1;
  bool accept = 2;
  bool all = 3;
}
message GuardRespondResponse {
  bool success = 1;
  string message = 2;
}

message GuardStatusRequest {}
message GuardStatusResponse {
  bool configured = 1;
  string device_id = 2;
  string steam_id = 3;
  uint32 state = 4;
  string shared_secret = 5;
  string uri = 6;
  string account_name = 7;
}

message GuardImportRequest {
  string shared_secret = 1;
  string identity_secret = 2;
  string device_id = 3;
  string account_name = 4;
  string refresh_token = 5;
}

message GuardImportResponse {
  bool success = 1;
  string message = 2;
}
