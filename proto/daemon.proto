syntax = "proto3";

package daemon;

option go_package = "github.com/lemon4ksan/g-man-cli/proto/daemon";

service DaemonService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);
  rpc StopDaemon(StopDaemonRequest) returns (StopDaemonResponse);
  rpc PlayGame(PlayGameRequest) returns (PlayGameResponse);
  rpc ExitGame(ExitGameRequest) returns (ExitGameResponse);
  rpc ExecAction(ExecActionRequest) returns (ExecActionResponse);
  rpc FreeMemory(FreeMemoryRequest) returns (FreeMemoryResponse);

  rpc StreamEvents(StreamEventsRequest) returns (stream StreamEventsResponse);
  rpc UpdateManualPrices(UpdateManualPricesRequest) returns (UpdateManualPricesResponse);

  rpc GuardCode(GuardCodeRequest) returns (GuardCodeResponse);
  rpc GuardStatus(GuardStatusRequest) returns (GuardStatusResponse);
  rpc GuardList(GuardListRequest) returns (GuardListResponse);
  rpc GuardRespond(GuardRespondRequest) returns (GuardRespondResponse);
  rpc GuardTransferStart(GuardTransferStartRequest) returns (GuardTransferStartResponse);
  rpc GuardTransferFinish(GuardTransferFinishRequest) returns (GuardTransferFinishResponse);
  rpc GuardLinkStart(GuardLinkStartRequest) returns (GuardLinkStartResponse);
  rpc GuardLinkFinalize(GuardLinkFinalizeRequest) returns (GuardLinkFinalizeResponse);
  rpc GuardSubmitAuthCode(GuardSubmitAuthCodeRequest) returns (GuardSubmitAuthCodeResponse);
  rpc GuardImport(GuardImportRequest) returns (GuardImportResponse);
  rpc GuardUnlock(GuardUnlockRequest) returns (GuardUnlockResponse);
  rpc SetFriendNickname(SetFriendNicknameRequest) returns (SetFriendNicknameResponse);
  rpc ExecRequest(ExecRequestRequest) returns (ExecRequestResponse);
}

message FreeMemoryRequest {}

message FreeMemoryResponse {
  string message = 1;
  uint64 memory_bytes = 2;
}

message GetStatusRequest {}

message GetStatusResponse {
  bool connected = 1;
  string steam_id = 2;
  uint32 current_appid = 3;
  string uptime = 4;
  uint64 memory_bytes = 5;
  string current_app_name = 6;
  bool locked = 7;
  string persona_name = 8;
  string ip_country = 9;
  int64 wallet_balance = 10;
  string wallet_currency = 11;
  bool is_limited = 12;
  bool is_community_banned = 13;
  uint32 vac_bans_count = 14;
  string email_address = 15;
  repeated string trusted_ids = 16;
  repeated string excluded_ids = 17;
}

message StopDaemonRequest {}

message StopDaemonResponse {
  string message = 1;
}

message PlayGameRequest {
  uint32 appid = 1;
}

message PlayGameResponse {
  string message = 1;
}

message ExitGameRequest {}

message ExitGameResponse {
  string message = 1;
}

message Item {
  uint64 asset_id = 1;
  uint32 def_index = 2;
  uint32 quality = 3;
  uint32 quantity = 4;
  bool is_tradable = 5;
  bool is_craftable = 6;
  map<string, string> attributes = 7;
  uint64 original_id = 8;
}

message ExecActionRequest {
  uint32 appid = 1;
  string action = 2;
  map<string, string> params = 3;
}

message ExecActionResponse {
  string message = 1;
  repeated Item items = 2;
  string details = 3;
}

message StreamEventsRequest {}

message StreamEventsResponse {
  string event_id = 1;
  string event_type = 2;
  string payload_json = 3;
  int64 timestamp = 4;
}

message ManualPriceEntry {
  uint32 buy_keys = 1;
  double buy_metal = 2;
  uint32 sell_keys = 3;
  double sell_metal = 4;
}

message UpdateManualPricesRequest {
  map<string, ManualPriceEntry> prices = 1;
}

message UpdateManualPricesResponse {
  string message = 1;
  bool success = 2;
}

message GuardCodeRequest {}
message GuardCodeResponse {
  string code = 1;
}

message GuardConfirmation {
  uint64 id = 1;
  uint64 nonce = 2;
  string title = 3;
  string type_name = 4;
  string description = 5;
}

message GuardListRequest {}
message GuardListResponse {
  repeated GuardConfirmation confirmations = 1;
}

message GuardRespondRequest {
  uint64 confirmation_id = 1;
  bool accept = 2;
  bool all = 3;
}
message GuardRespondResponse {
  bool success = 1;
  string message = 2;
}

message GuardStatusRequest {}
message GuardStatusResponse {
  bool configured = 1;
  string device_id = 2;
  string steam_id = 3;
  uint32 state = 4;
  string shared_secret = 5;
  string uri = 6;
  string account_name = 7;
}

message GuardTransferStartRequest {}
message GuardTransferStartResponse {
  bool success = 1;
  string message = 2;
}

message GuardTransferFinishRequest {
  string sms_code = 1;
}
message GuardTransferFinishResponse {
  bool success = 1;
  string shared_secret = 2;
  string identity_secret = 3;
  string revocation_code = 4;
  string device_id = 5;
  string uri = 6;
}

message GuardLinkStartRequest {
  string device_id = 1;
}
message GuardLinkStartResponse {
  bool success = 1;
  string shared_secret = 2;
  string identity_secret = 3;
  string revocation_code = 4;
  string device_id = 5;
  string uri = 6;
  string phone_number_hint = 7;
  uint64 server_time = 8;
}

message GuardLinkFinalizeRequest {
  string shared_secret = 1;
  uint64 server_time = 2;
  string sms_code = 3;
  string identity_secret = 4;
  string device_id = 5;
}
message GuardLinkFinalizeResponse {
  bool success = 1;
  string message = 2;
}

message GuardSubmitAuthCodeRequest {
  string code = 1;
}

message GuardSubmitAuthCodeResponse {
  bool success = 1;
  string message = 2;
}

message GuardImportRequest {
  string shared_secret = 1;
  string identity_secret = 2;
  string device_id = 3;
  string account_name = 4;
  string refresh_token = 5;
}

message GuardImportResponse {
  bool success = 1;
  string message = 2;
}

message GuardUnlockRequest {
  string passphrase = 1;
}

message GuardUnlockResponse {
  bool success = 1;
  string message = 2;
}

message SetFriendNicknameRequest {
  uint64 steam_id = 1;
  string nickname = 2;
}

message SetFriendNicknameResponse {
  bool success = 1;
  string message = 2;
}

enum RequestType {
  REQUEST_TYPE_UNSPECIFIED = 0;
  REQUEST_TYPE_COMMUNITY = 1;
  REQUEST_TYPE_UNIFIED = 2;
  REQUEST_TYPE_WEBAPI = 3;
}

message ExecRequestRequest {
  RequestType type = 1;
  string method = 2;
  string path = 3;
  map<string, string> params = 4;
  bytes body = 5;
  bool is_post_form = 6;
  int32 version = 7;
  string interface = 8;
  string action = 9;
}

message ExecRequestResponse {
  bool success = 1;
  string message = 2;
  bytes body = 3;
  int32 status_code = 4;
  uint32 eresult = 5;
  map<string, string> headers = 6;
}
